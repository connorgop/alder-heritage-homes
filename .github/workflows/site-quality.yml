name: Site Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: site-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-audit:
    name: Typecheck, Build, Prerender, SEO Audit
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Build and prerender
        run: pnpm build
        env:
          CI: true

      - name: SEO audit
        run: pnpm audit-seo

      - name: Upload SEO report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-audit-report
          path: dist/seo-audit-report.json
          if-no-files-found: ignore
